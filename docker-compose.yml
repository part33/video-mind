services:
  # =========================================
  # 1. MySQL (数据库)
  # =========================================
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: mysql-media
    ports:
      - "3307:3306"  # 你的配置里用的是 3307
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=media_db
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
    networks:
      - my-network

  # =========================================
  # 2. Redis (缓存 & 分布式锁)
  # =========================================
  redis:
    image: docker.m.daocloud.io/library/redis:latest
    container_name: redis-media
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - my-network

  # =========================================
  # 3. MinIO (对象存储)
  # =========================================
  minio:
    image: docker.m.daocloud.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # 控制台端口
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - my-network

  # =========================================
  # 4. RocketMQ NameServer (大脑)
  # =========================================
  rmqnamesrv:
    image: docker.m.daocloud.io/apache/rocketmq:5.2.0
    container_name: rmqnamesrv
    ports:
      - 9876:9876
    environment:
      - JAVA_OPT_EXT=-server -Xms128m -Xmx192m -Xmn64m
    command: sh mqnamesrv
    networks:
      - my-network

  # =========================================
  # 5. RocketMQ Broker (干活的)
  # =========================================
  rmqbroker:
    image: docker.m.daocloud.io/apache/rocketmq:5.2.0
    container_name: rmqbroker
    ports:
      - 10911:10911
      - 10909:10909
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - BROKER_ID=0
      - BROKER_ROLE=ASYNC_MASTER
      - JAVA_OPT_EXT=-server -Xms128m -Xmx192m -Xmn64m
    command:
      - sh
      - -c
      - |
        cat <<'EOF' > /tmp/broker.conf
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        autoCreateTopicEnable = true
        brokerIP1 = 127.0.0.1
        EOF
        sh mqbroker -n rmqnamesrv:9876 -c /tmp/broker.conf
    depends_on:
      - rmqnamesrv
    networks:
      - my-network

  # =========================================
  # 6. RocketMQ Dashboard (可视化控制台)
  # =========================================
  rmqdashboard:
    image: docker.m.daocloud.io/apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    profiles:
      - tools
    ports:
      - 8180:8082
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rmqnamesrv:9876
    depends_on:
      - rmqnamesrv
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  mysql_data:
  mysql_logs:
  minio_data:
