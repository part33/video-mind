server.port=9090

spring.datasource.url=jdbc:h2:file:./data/demo-db;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-demo.sql

spring.autoconfigure.exclude=org.redisson.spring.starter.RedissonAutoConfiguration,org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

app.demo-mode=true
app.storage.mode=local
app.storage.local-root=./demo-storage
app.analysis.mode=local
app.ai.mode=demo

ai.deepseek.api-key=
ai.deepseek.base-url=https://api.siliconflow.cn/v1
ai.aliyun.api-key=

minio.endpoint=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucketName=media

tool.ytdlp.path=
tool.ffmpeg.dir=

rocketmq.name-server=127.0.0.1:9876
rocketmq.producer.group=video-analysis-group
rocketmq.producer.send-message-timeout=3000
